version: '3.8'

services:
  api:
    build: .
    container_name: plant-care-api
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    volumes:
      - ./models/checkpoints:/app/models/checkpoints
    command: python main.py
    networks:
      - plant-care-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  streamlit:
    build: .
    container_name: plant-care-streamlit
    ports:
      - "8501:8501"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    command: streamlit run frontend/streamlit_app.py --server.address=0.0.0.0
    networks:
      - plant-care-network
    depends_on:
      - api

networks:
  plant-care-network:
    driver: bridge